<svg width="300" height="190" xmlns="http://www.w3.org/2000/svg"
     font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif">
  <rect width="300" height="190" fill="#f8f9fa" rx="5" stroke="#d0d0d0" stroke-width="1"/>

  <text x="110" y="18" text-anchor="middle" font-size="11" fill="#555">直接</text>
  <text x="235" y="18" text-anchor="middle" font-size="11" fill="#555">間接</text>
  <text x="30" y="90" text-anchor="middle" font-size="11" fill="#555" transform="rotate(-90 30 90)">具体</text>
  <text x="30" y="150" text-anchor="middle" font-size="11" fill="#555" transform="rotate(-90 30 150)">抽象</text>

  <rect x="50" y="25" width="240" height="155" fill="none" stroke="#bbb" stroke-width="1.5"/>
  <line x1="170" y1="25" x2="170" y2="180" stroke="#bbb" stroke-width="1"/>
  <line x1="50" y1="102" x2="290" y2="102" stroke="#bbb" stroke-width="1"/>

  <!-- 具体×直接 -->
  <rect x="51" y="26" width="118" height="75" fill="white" rx="2"/>
  <text x="110" y="60" text-anchor="middle" font-size="10" fill="#888">具体×直接</text>
  <text x="110" y="74" text-anchor="middle" font-size="9" fill="#aaa">Lightning 直差し</text>

  <!-- 具体×間接 -->
  <rect x="171" y="26" width="118" height="75" fill="white" rx="2"/>
  <text x="230" y="60" text-anchor="middle" font-size="10" fill="#888">具体×間接</text>
  <text x="230" y="74" text-anchor="middle" font-size="9" fill="#aaa">変換アダプター経由</text>

  <!-- 抽象×直接 -->
  <rect x="51" y="103" width="118" height="76" fill="white" rx="2"/>
  <text x="110" y="138" text-anchor="middle" font-size="10" fill="#888">抽象×直接</text>
  <text x="110" y="152" text-anchor="middle" font-size="9" fill="#aaa">USB-C 直差し</text>

  <!-- ★ 抽象×間接（ハイライト） -->
  <rect x="171" y="103" width="118" height="76" fill="#d4edda" rx="2"/>
  <text x="230" y="138" text-anchor="middle" font-size="11" font-weight="bold" fill="#155724">★ 抽象×間接</text>
  <text x="230" y="154" text-anchor="middle" font-size="9" fill="#155724">USB-C ハブ経由</text>
</svg>
