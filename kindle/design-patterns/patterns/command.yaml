# patterns/command.yaml
# Commandパターンの定義ファイル
# chapter-agentがこのファイルを読んで章の素材として使う

pattern:
  name: Command
  chapter: 5
  subtitle: "操作をオブジェクトにして、操作の主導権を取り戻す"
  tagline: "実行する操作をオブジェクトとして表現し、取り消し・再実行・記録を可能にする"
  change_type: "「実行する操作」が変わる"

scenario:
  domain: "家計簿アプリの操作履歴"
  system_overview: |
    収入・支出を記録してカテゴリごとに集計する家計簿アプリ。
    LedgerManager クラスがエントリーの追加・削除・カテゴリ変更を担当する。
    ユーザーが誤って操作したときに「元に戻す」機能の追加が求められた。
  current_spec:
    - "LedgerManager::addEntry(date, amount, category)：収支エントリーを追加する"
    - "LedgerManager::deleteEntry(entryId)：エントリーを削除する"
    - "LedgerManager::changeCategory(entryId, newCategory)：カテゴリを変更する"
    - "各操作はすぐに内部リストに反映される"
    - "操作の履歴は保持していない"
  situation:
    who: "プロダクトマネージャーから"
    what: "undo（元に戻す）機能を追加してほしい。操作を誤って削除したユーザーからの問い合わせが多い"
    deadline: "次のスプリント"

observations:
  - "「何をしたか」という情報がLedgerManagerのどこにも残っていない"
  - "undoを実装するには、各操作が『何をどのように実行したか』を記録しておく必要がある"
  - "addEntry・deleteEntry・changeCategoryは実行するだけで、取り消しに必要な逆操作の情報を持っていない"
  - "操作の種類が増えるたびにundo処理の分岐が増え、管理が難しくなることが予測できる"

trial_approach: "undoスタックにoperationType（enum）と操作前のリスト全体をコピーして保存する"
trial_limits:
  - "エントリー数が増えると全体コピーのメモリコストが大きくなる"
  - "操作の種類が増えるたびにenum分岐とundo処理の両方を追加する必要がある"
  - "redoを追加しようとすると複雑なスタック管理が必要になる"

advanced_scenario:
  what: "月末一括入力（複数の支出をまとめて追加）を、1回のundoでまとめて取り消したい"
  extension: |
    Commandパターンでは、複数のCommandオブジェクトをリストで持つ
    MacroCommand（コンポジット）として実装できる。
    「操作をオブジェクトとして持つ」ことで、操作の組み合わせが自然に表現できる。
  difficulty_type: "パターンA：複数操作のまとめて取り消しが必要になった"

threshold:
  use_when:
    - "undo/redoが必要"
    - "操作の実行をキューに入れたり遅延実行したりする必要がある"
    - "操作の種類が今後も増える見込みがある"
  skip_when:
    - "操作が取り消せなくていい（書き込み専用ログなど）"
    - "操作が1〜2種類で今後も増えない"
