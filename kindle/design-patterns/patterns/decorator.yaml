# patterns/decorator.yaml
# Decoratorパターンの定義ファイル
# chapter-agentがこのファイルを読んで章の素材として使う

pattern:
  name: Decorator
  chapter: 6
  subtitle: "クラスを増やさずに、機能を積み重ねる"
  tagline: "継承を使わず、機能の組み合わせをオブジェクトの包み込みで表現する"
  change_type: "「機能の組み合わせ」が変わる"

scenario:
  domain: "カスタマイズ注文システム"
  system_overview: |
    カフェの注文をシステムで管理するモジュール。
    ベースドリンク（エスプレッソ・アメリカーノ）に対して、
    ミルク・ホイップ・シロップなどのオプションを組み合わせて注文できる。
    現状は組み合わせごとに専用のクラスを作って対応している。
  current_spec:
    - "Espresso：エスプレッソ（基本価格300円）"
    - "EspressoWithMilk：エスプレッソ＋ミルク（350円）"
    - "EspressoWithWhip：エスプレッソ＋ホイップ（370円）"
    - "EspressoWithMilkAndWhip：エスプレッソ＋ミルク＋ホイップ（420円）"
    - "各クラスは getDescription() と getCost() を持つ"
  situation:
    who: "店長から"
    what: "オーツミルクを新しいオプションとして追加したい。既存ミルクとの組み合わせにも対応してほしい"
    deadline: "来週のメニュー改定に合わせて"

observations:
  - "オプションが1つ増えるたびに、既存の全組み合わせとの掛け合わせで新クラスが大量に必要になる"
  - "N種類のオプションがあると最大 2^N 通りの組み合わせクラスが必要になる"
  - "「ミルクを追加する」という処理が EspressoWithMilk・EspressoWithMilkAndWhip などに重複している"
  - "1か所のオプション価格変更が複数クラスの修正を必要とする"

trial_approach: "DrinkManagerクラスにオプションのリストを持たせ、合計金額をループで計算する"
trial_limits:
  - "DrinkManagerはDrinkのインターフェースを実装していないため、Drinkとして差し替えできない"
  - "オプションを適用する順序に依存する処理（先にミルクを温めてからホイップを乗せるなど）に対応できない"

advanced_scenario:
  what: "全ドリンクに自動でカップサイズ料金を加算したい（全組み合わせに共通で）"
  extension: |
    Decoratorパターンでは、SizePriceDecorator を追加するだけ。
    既存のクラスに触れず、すべての組み合わせに一括で適用できる。
    「包み込む」という構造が、横断的な機能追加を可能にする。
  difficulty_type: "パターンA：全組み合わせに横断的な機能を追加したい"

threshold:
  use_when:
    - "機能の組み合わせが多様で、組み合わせの数が今後も変わる"
    - "継承で組み合わせを表現するとクラスが増えすぎる場面"
    - "実行時に動的に機能を組み合わせたい"
  skip_when:
    - "機能の組み合わせが固定で2〜3パターンしかない"
    - "機能の追加が実行時でなくコンパイル時に決まる"
