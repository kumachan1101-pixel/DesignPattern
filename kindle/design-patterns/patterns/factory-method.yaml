# patterns/factory-method.yaml
# Factory Methodパターンの定義ファイル
# chapter-agentがこのファイルを読んで章の素材として使う

pattern:
  name: FactoryMethod
  chapter: 8
  subtitle: "何を作るかを、使う側に決めさせない"
  tagline: "オブジェクトの生成を分離し、『作る判断』と『使う処理』を分ける"
  change_type: "「作るオブジェクト」が変わる"

scenario:
  domain: "決済プロセッサーの切り替え"
  system_overview: |
    ECサイトの注文確定時に決済処理を実行するモジュール。
    決済手段（クレジットカード・PayPal・銀行振込）に応じて
    異なる IPaymentProcessor 実装を使って決済を実行する。
    現状は PaymentService クラスが決済手段を判断してオブジェクトを生成している。
  current_spec:
    - "決済手段：CreditCardProcessor・PayPalProcessor・BankTransferProcessor"
    - "PaymentService::process(method, amount)：methodに応じてif/elseでProcessorを生成する"
    - "生成した Processor の execute(amount) を呼び出して決済を実行する"
    - "決済手段の判断・生成・実行が1つのメソッドに集約されている"
  situation:
    who: "事業開発から"
    what: "QRコード決済（QRPayProcessor）を新しい決済手段として追加したい"
    deadline: "来月のキャンペーン開始に合わせて"

observations:
  - "新しい決済手段を追加するたびに PaymentService::process() のif/elseを開いて変更する"
  - "『どの決済手段を作るか』という生成の判断と、『作ったProcessorをどう使うか』という利用処理が同じ場所にある"
  - "テスト時に特定のProcessorだけを渡す方法がなく、常にmethod判断ロジックを通る"
  - "将来、モバイル決済・後払いなど決済手段が増えるほどif/elseが膨らむことが予測できる"

trial_approach: "Processor生成部分を createProcessor(method) という別メソッドに切り出す"
trial_limits:
  - "切り出しただけで決済手段の判断ロジックが生きており、新手段追加には createProcessor() の変更が必要"
  - "PaymentServiceが依然として全具体クラス（CreditCard・PayPal・BankTransfer）を知っている"

advanced_scenario:
  what: "顧客の契約プランによって使える決済手段を変えたい（法人プランは銀行振込のみ、個人は全手段）"
  extension: |
    Factory Methodパターンでは、CorporatePaymentFactory・PersonalPaymentFactory という
    プラン別ファクトリを追加するだけで対応できる。
    既存の PaymentService（利用側）には一切触れない。
    「生成の判断をサブクラスに委ねる」という構造が、契約プラン別の切り替えを可能にする。
  difficulty_type: "パターンD：生成ルールが複数軸（手段×プラン）で変わる"

threshold:
  use_when:
    - "作るオブジェクトの種類が今後も増える見込みがある"
    - "オブジェクトの生成ロジックと利用ロジックを独立してテストしたい"
    - "生成するオブジェクトの種類が設定・環境・ユーザープランごとに変わる"
  skip_when:
    - "生成するオブジェクトが1種類で今後も変わらない"
    - "生成ロジックが1行で済む（new CreditCardProcessor() だけなど）"
