# patterns/observer.yaml
# Observerパターンの定義ファイル
# chapter-agentがこのファイルを読んで章の素材として使う

pattern:
  name: Observer
  chapter: 7
  subtitle: "更新する側が、反応する相手を知らなくていい"
  tagline: "状態の変化元と反応先を分離し、反応先の増減を変化元に伝えない"
  change_type: "「変化に反応する相手」が変わる"

scenario:
  domain: "在庫管理システム"
  system_overview: |
    倉庫の入出庫を管理するシステム。
    InventoryManager クラスが在庫数の更新を担当し、
    在庫数が変わったとき複数のシステムが反応する必要がある。
    現状は InventoryManager が反応先クラスを直接呼び出している。
    反応先は「ECサイトの在庫表示」「バイヤーへのアラート送信」「自動発注トリガー」の3か所。
  current_spec:
    - "InventoryManager::updateStock(productId, quantity)：在庫数を更新する"
    - "更新後に StockDisplayUpdater::refresh(productId) を呼び出す"
    - "更新後に BuyerAlertSender::notify(productId, quantity) を呼び出す"
    - "更新後に AutoOrderTrigger::check(productId, quantity) を呼び出す"
    - "3つの呼び出しが全て updateStock() の中に直接書かれている"
  situation:
    who: "物流部門から"
    what: "在庫が一定数を下回ったとき、物流倉庫にも自動でピッキング指示を送りたい"
    deadline: "今月末の倉庫システム統合に合わせて"

observations:
  - "InventoryManagerは在庫数の管理が責任のはずなのに、反応先の具体クラスを3つも知っている"
  - "反応先が1つ増えるたびに InventoryManager のコードを開いて変更しなければならない"
  - "InventoryManagerと反応先クラスの間に直接依存があるため、テスト時に全反応先が起動する"
  - "反応先を増やすかどうかの判断（EC担当・バイヤー・物流）と、在庫管理の責任が同じクラスに混在している"

trial_approach: "反応先リストをInventoryManagerにリストで持たせ、ループで呼び出す"
trial_limits:
  - "反応先クラスごとにメソッド名が異なるため、共通インターフェースなしではループで呼べない"
  - "InventoryManagerが依然として反応先の具体クラスを知っており、依存は解消されない"

advanced_scenario:
  what: "特定の反応先だけ『食品カテゴリの商品限定』で反応させたい（商品カテゴリに応じた条件付き購読）"
  extension: |
    Observerパターンでは、IStockObserver に onStockChanged(productId, quantity) を持たせ、
    各Observerが自分で「反応するかどうか」を判断できる。
    InventoryManagerは全Observerに通知するだけで、条件判断はObserver側に委ねられる。
  difficulty_type: "パターンA：反応条件が Observer ごとに異なる"

threshold:
  use_when:
    - "ある状態変化への反応先が複数あり、今後も変わる可能性がある"
    - "変化元が反応先の具体クラスを知っているため、反応先の追加に変更が必要"
    - "反応先ごとに独立してテストしたい"
  skip_when:
    - "反応先が1か所だけで今後も増えない"
    - "反応先が変わるたびに変化元も必ず変わるビジネスルール（密結合が正しい場合）"
