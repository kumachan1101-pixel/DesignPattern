# patterns/facade.yaml
# Facadeパターンの定義ファイル
# chapter-agentがこのファイルを読んで章の素材として使う

pattern:
  name: Facade
  chapter: 2
  subtitle: "使う側に知らせない勇気"
  tagline: "複数の具体クラスへの依存を一本化し、変更の影響範囲を限定する"
  change_type: "使う側が知らなくていいことまで知っている（依存の過多）"

scenario:
  domain: "ネット銀行の振り込み処理"
  system_overview: |
    口座番号と金額を受け取り、振り込みを完了させる処理モジュール。
    TransferApplication クラスが呼び出し元から使われ、
    4つのサービスと連携して処理を完結させる。
    - BalanceService：口座残高を確認する
    - TransferService：振り込みを実行する（外部銀行APIと接続）
    - AuditService：取引記録をDBに保存する
    - NotificationService：振り込み完了をメールで通知する
  current_spec:
    - "TransferApplication::execute(fromId, toId, amount) が呼び出し元から呼ばれる"
    - "BalanceService.check(accountId) で残高が十分かを確認する"
    - "TransferService.sendV1(fromId, toId, amount, 'JPY') で振り込みを実行する"
    - "AuditService.record(fromId, toId, amount) で取引記録を保存する"
    - "NotificationService.send(fromId, amount) で完了通知を送る"
  situation:
    who: "インフラ担当から"
    what: "TransferServiceが外部銀行APIのv2に切り替わります。メソッド名が transfer(request) に変わり、引数はRequestオブジェクトになります"
    deadline: "来月の切り替えまでに"

observations:
  - "TransferApplication が TransferService のメソッド名・引数形式を直接知っている"
  - "TransferServiceのAPI形式という『TransferServiceの責任』がTransferApplicationの中に染み出している"
  - "同じ染み出しが TransferApplication・ScheduledTransferJob・BulkTransferBatch の3ファイルに存在する"
  - "v2切り替えで3ファイル全てを修正しなければならない"

trial_approach: "TransferServiceの呼び出しをラッパーメソッドに切り出してTransferApplicationから隠す"
trial_limits:
  - "TransferApplicationが依然としてTransferServiceの具体クラスを直接知っている"
  - "ScheduledTransferJob・BulkTransferBatch にも同じ問題が残る"

advanced_scenario:
  what: "将来、口座IDの型をintからstringに変えたい（海外口座統合の可能性）"
  extension: |
    口座IDの型が変わると IBalanceService・ITransferService・IAuditService・INotificationService の
    4つのインターフェース全てのシグネチャが変わる。
    こういう状況では「型をどう扱うかをチームで先に合意する」という問いを立てる。
    選択肢：①現状int固定で合意する ②独自型（AccountId）で表現する
  difficulty_type: "パターンB：インターフェースのシグネチャ自体が変わるリスク"

threshold:
  use_when:
    - "複数の具体クラスへの依存が呼び出し元コードに染み出している"
    - "外部サービスやAPIのバージョン変更が定期的に発生する"
    - "同じ具体クラスへの依存が複数の呼び出し元に重複している"
  skip_when:
    - "外部サービスが1つだけで、変更頻度が低い"
    - "呼び出し元が1箇所しかなく、将来的に増える見込みがない"
