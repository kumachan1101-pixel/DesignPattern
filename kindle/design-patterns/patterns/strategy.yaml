# patterns/strategy.yaml
# Strategyパターンの定義ファイル
# chapter-agentがこのファイルを読んで章の素材として使う

pattern:
  name: Strategy
  chapter: 1
  subtitle: "役割を分かち合い、共に歩む"
  tagline: "巨大な条件分岐から「振る舞い」を独立させ、安心を取り戻す"
  change_type: "実行する「振る舞い（アルゴリズム）」が変わる"

scenario:
  domain: "ECサイトの決済計算モジュール"
  system_overview: |
    受注した商品の合計金額を計算し、割引・消費税を適用して
    最終請求額を返すモジュール。
    法人顧客（B2B）と一般顧客（B2C）で異なる割引ルールを持つ。
  current_spec:
    - "法人顧客（B2B）には基本料金の10%引きを適用する"
    - "プレミアム契約かつ100個以上の注文には、さらに5万円を差し引く"
    - "継続年数が1年を超える法人顧客には、さらに1万円を差し引く"
    - "一般顧客（B2C）は夏のセール期間中20%引きを適用する"
    - "初回購入者には一律500円引きを適用する"
    - "最終金額に消費税10%を加算する"
    - "最終金額が0円を下回る場合は0円とする"
  situation:
    who: "営業チームから"
    what: "秋の特大セールを来週末に開始したい。新しい割引ルールを追加してほしい"
    deadline: "5日後のリリース"

observations:
  - "キャンペーンや法人の新契約が決まるたびに、calculateTotalAmount関数本体に手を入れる必要がある"
  - "法人担当チームとキャンペーン担当チームが、同じ関数という1つの空間を共有してしまっている"
  - "B2Cの条件を1行直しただけで、B2Bのテストをやり直す恐怖が生まれる"

trial_approach: "割引率や割引額を引数として外から渡してもらう"
trial_limits:
  - "複雑な条件（100個以上の時だけ）を数値1つで表現しきれない"
  - "計算を決める巨大なif文が呼び出し元に移動しただけで、問題は解消されない"

advanced_scenario:
  what: "複数の割引ルールを順番に重ねて適用したい（秋セール＋会員割引＋クーポン）"
  extension: "std::vector<unique_ptr<BillingRule>>で複数ルールを順次適用する形に拡張する"
  difficulty_type: "パターンA：複数のルールを組み合わせる必要が出た"

threshold:
  use_when:
    - "割引ルールが5個を超えて成長し続けている"
    - "担当チームが物理的に別れている（法人担当・キャンペーン担当など）"
    - "ロジックを独立してテストしたい"
  skip_when:
    - "2〜3個の固定された分岐で今後も変わる予定がない"
    - "1人で全容を把握できる規模のコード"

next_chapter:
  preview: "次章では「通知を受け取る相手が変わる」という別の種類の変化を扱います"
