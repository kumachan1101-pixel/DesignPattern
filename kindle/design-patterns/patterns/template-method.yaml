# patterns/template-method.yaml
# Template Methodパターンの定義ファイル
# chapter-agentがこのファイルを読んで章の素材として使う

pattern:
  name: TemplateMethod
  chapter: 4
  subtitle: "変わらない流れと、変わる中身を分ける"
  tagline: "処理の骨格を固定し、変わる一部だけをサブクラスに委ねる"
  change_type: "「処理の一部のステップ」が変わる"

scenario:
  domain: "CSVインポート処理"
  system_overview: |
    管理画面からアップロードされたCSVファイルをDBに取り込む処理モジュール。
    取り込む対象は「商品マスタ」「顧客」「社員」の3種類。
    各インポーターは「ファイル読み込み → バリデーション → データ変換 → DB保存」
    という共通の流れを持つが、バリデーションルールとデータ変換ロジックが種類ごとに異なる。
  current_spec:
    - "ProductImporter：商品マスタCSVを読み込み、商品テーブルに保存する"
    - "CustomerImporter：顧客CSVを読み込み、顧客テーブルに保存する"
    - "EmployeeImporter：社員CSVを読み込み、社員テーブルに保存する"
    - "3クラスともファイル読み込みとログ出力の処理は共通"
    - "バリデーションルールとデータ変換ロジックだけが異なる"
  situation:
    who: "営業部門から"
    what: "取引先CSVのインポート機能を追加してほしい。バリデーションは顧客とは別のルールになる"
    deadline: "2週間後"

observations:
  - "3クラスのimport()メソッドの冒頭と末尾（ファイル読み込み・ログ出力）がほぼコピペになっている"
  - "流れの骨格（読み込み→バリデーション→変換→保存）は3クラスで同じだが、クラスをまたいで表現されている"
  - "新しいインポーターを追加するたびに、既存クラスのコードを参照しながら同じ骨格を手で再現する"
  - "バリデーション漏れや保存前後の順序ミスがあっても、骨格を管理する場所がないため発見しづらい"

trial_approach: "共通処理をユーティリティ関数に切り出して、各クラスから呼ぶ"
trial_limits:
  - "ユーティリティ関数を呼ぶ順序・呼ぶかどうかが各クラスに委ねられ、骨格は依然として分散する"
  - "新しいクラスを作る人がユーティリティ関数の存在と呼び出し順を知っていなければならない"

advanced_scenario:
  what: "全インポート処理の前後に『実行ログ記録』と『完了通知』を追加したい"
  extension: |
    Template Methodパターンでは、親クラスのimport()に実行ログと完了通知の呼び出しを
    1か所追加するだけで全サブクラスに自動的に反映される。
    「流れを固定している場所が1つ」であることの価値が最も見えやすい変更ケース。
  difficulty_type: "パターンA：共通の骨格を変えたいのに全クラスを個別修正している"

threshold:
  use_when:
    - "複数のクラスで処理の流れ（ステップの順序）が共通していて、一部のステップだけ異なる"
    - "処理の骨格を守ることがビジネス上の要件になっている（バリデーション順序・ログ出力など）"
    - "骨格を変えたいときに複数クラスを同時に修正している"
  skip_when:
    - "処理の流れ自体が各クラスで全く異なる"
    - "共通する部分が1〜2行程度で、抽象クラスを作るコストが見合わない"
