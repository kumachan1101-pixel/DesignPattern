# patterns/template-method.yaml
# Template Methodパターンの定義ファイル
# chapter-agentがこのファイルを読んで章の素材として使う

pattern:
  name: TemplateMethod
  chapter: 4
  subtitle: "変わらない流れと、変わる中身を分ける"
  tagline: "処理の骨格を固定し、変わる一部だけをサブクラスに委ねる"
  change_type: "「処理の一部のステップ」が変わる"

scenario:
  domain: "定期レポート生成バッチ"
  system_overview: |
    毎日・毎週・毎月の3種類の定期レポートを生成するバッチシステム。
    各レポートは「データ収集 → データ集計 → フォーマット適用 → 出力先に書き込み」
    という共通の流れを持つが、集計ロジックと出力先がレポートの種類によって異なる。
  current_spec:
    - "DailyReportBatch：前日の売上データを集計してCSVに書き出す"
    - "WeeklyReportBatch：週次のKPIを計算してメールで送信する"
    - "MonthlyReportBatch：月次の損益を集計してPDFに出力する"
    - "3クラスともデータ収集とログ出力の処理は共通"
    - "集計ロジックと出力処理だけが異なる"
  situation:
    who: "経営企画から"
    what: "四半期レポートを追加してほしい。集計は月次の延長だが、出力先はダッシュボードAPIになる"
    deadline: "3日後"

observations:
  - "3クラスのrun()メソッドの冒頭と末尾（データ収集・ログ出力）がほぼコピペになっている"
  - "流れの骨格（収集→集計→フォーマット→出力）は3クラスで同じだが、クラスをまたいで表現されている"
  - "新しいレポート種別を追加するたびに、既存クラスのコードを参照しながら同じ骨格を手で再現する"
  - "「正しい流れ」が守られているかどうか、レビューで1行ずつ確認するしかない"

trial_approach: "共通部分をユーティリティ関数に切り出して、各クラスから呼ぶ"
trial_limits:
  - "ユーティリティ関数を呼ぶ順序・呼ぶかどうかが各クラスに委ねられ、骨格は依然として分散する"
  - "新しいクラスを作る人がユーティリティ関数の存在と呼び出し順を知っていなければならない"

advanced_scenario:
  what: "レポートの前後に『監査ログ出力』と『通知送信』を全レポートに追加したい"
  extension: |
    Template Methodパターンでは、親クラスのrun()に監査ログと通知の呼び出しを1か所追加するだけで
    全サブクラスに自動的に反映される。
    「流れを固定している場所が1つ」であることの価値が最も見えやすい変更ケース。
  difficulty_type: "パターンA：共通の骨格を変えたいのに全クラスを個別修正している"

threshold:
  use_when:
    - "複数のクラスで処理の流れ（ステップの順序）が共通していて、一部のステップだけ異なる"
    - "処理の骨格を守ることがビジネス上の要件になっている（監査・コンプライアンス等）"
    - "骨格を変えたいときに複数クラスを同時に修正している"
  skip_when:
    - "処理の流れ自体が各クラスで全く異なる"
    - "共通する部分が1〜2行程度で、抽象クラスを作るコストが見合わない"

next_chapter:
  preview: "次章では「実行する操作そのもの」をオブジェクトとして扱う考え方を見ます"
