# patterns/state.yaml
# Stateパターンの定義ファイル
# chapter-agentがこのファイルを読んで章の素材として使う

pattern:
  name: State
  chapter: 3
  subtitle: "状態の数だけ増殖する条件分岐を断ち切る"
  tagline: "状態ごとの振る舞いをクラスとして切り出し、if文の増殖を止める"
  change_type: "「状態」によって振る舞いが変わる"

scenario:
  domain: "ECサイトの注文ステータス管理"
  system_overview: |
    ECサイトで受け付けた注文を管理するシステム。
    注文には「注文受付」→「入金確認」→「発送済み」→「完了」というステータスがあり、
    状態に応じて「キャンセル」「返品」「催促メール送信」の振る舞いが変わる。
    OrderManager クラスが注文オブジェクトと現在ステータスを保持している。
  current_spec:
    - "注文ステータス：OrderReceived / PaymentConfirmed / Shipped / Completed"
    - "cancel()：注文受付・入金確認の場合のみキャンセル可。発送済み以降は不可"
    - "requestReturn()：発送済み・完了の場合のみ返品申請可。それ以前は不可"
    - "sendReminder()：入金確認の場合のみ催促メールを送信。他の状態では何もしない"
    - "各操作の前にステータスをチェックするif文がOrderManagerの中にある"
  situation:
    who: "営業企画から"
    what: "『入金待ち』という新しいステータスを追加したい。入金確認前の猶予期間を設ける"
    deadline: "来週のリリース"

observations:
  - "cancel()・requestReturn()・sendReminder() の中にそれぞれ同じステータス確認のif文が重複している"
  - "ステータスが1つ増えるたびに、3つのメソッド全てのif文を開いて修正する必要がある"
  - "「このステータスのときこのメソッドはどう動くか」の情報が、1か所に集まっていない"
  - "ステータスと振る舞いのマトリクスが開発者の頭の中にしかなく、コードから読み取れない"

trial_approach: "ステータスをenumで持ち、各メソッドの先頭でswitch文に統一する"
trial_limits:
  - "switch文を使っても、ステータスが増えるたびに全メソッドのswitchを開く必要がある"
  - "ステータスが増えるほどswitch文の分岐が増え、「どのステータスで何ができるか」が追いにくくなる"

advanced_scenario:
  what: "『一時停止』状態を追加したい（支払いトラブル時に全操作を一時的にロック）"
  extension: |
    Stateパターンでは、一時停止状態を IOrderState を実装した SuspendedState クラスとして追加する。
    既存のステータスクラスに触れずに新しい状態を追加できることが確認できる。
    「既存コードへの影響ゼロ」がStataパターンの真の価値。
  difficulty_type: "パターンA：新しい状態を追加するたびに全振る舞いへの影響が出る"

threshold:
  use_when:
    - "ステータスが4つ以上あり、今後も増える見込みがある"
    - "複数のメソッドが「現在のステータス」によって振る舞いを変えている"
    - "ステータスの追加・変更のたびに複数箇所を修正している"
  skip_when:
    - "2〜3個の固定された状態で振る舞いの変化も単純"
    - "状態が増える見込みがなく、メソッド数も少ない"

next_chapter:
  preview: "次章では「処理の一部のステップだけ」が変わるという別の変化を扱います"
