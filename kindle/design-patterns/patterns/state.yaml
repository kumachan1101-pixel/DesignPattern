# patterns/state.yaml
# Stateパターンの定義ファイル
# chapter-agentがこのファイルを読んで章の素材として使う

pattern:
  name: State
  chapter: 3
  subtitle: "状態の数だけ増殖する条件分岐を断ち切る"
  tagline: "状態ごとの振る舞いをクラスとして切り出し、if文の増殖を止める"
  change_type: "「状態」によって振る舞いが変わる"

scenario:
  domain: "チケット予約管理システム"
  system_overview: |
    コンサートや演劇などのチケット予約を管理するシステム。
    予約には「予約受付」→「支払い待ち」→「確定」→「発券済み」→「入場済み」というステータスがあり、
    状態に応じて「キャンセル」「払い戻し」「入場確認」の振る舞いが変わる。
    ReservationManager クラスが予約オブジェクトと現在ステータスを保持している。
  current_spec:
    - "予約ステータス：Reserved / AwaitingPayment / Confirmed / Issued / Admitted"
    - "cancel()：予約受付・支払い待ちの場合のみキャンセル可。確定以降はキャンセル不可"
    - "refund()：確定・発券済みの場合のみ払い戻し申請可。それ以前または入場済みは不可"
    - "admit()：発券済みの場合のみ入場確認可。他の状態では何もしない"
    - "各操作の前にステータスをチェックするif文がReservationManagerの中にある"
  situation:
    who: "運営企画から"
    what: "『席変更受付中』という新しいステータスを追加したい。確定後の一定期間に席変更を受け付ける"
    deadline: "次回公演の2週間前"

observations:
  - "cancel()・refund()・admit() の中にそれぞれ同じステータス確認のif文が重複している"
  - "ステータスが1つ増えるたびに、3つのメソッド全てのif文を開いて修正する必要がある"
  - "「このステータスのときこのメソッドはどう動くか」の情報が、1か所に集まっていない"
  - "ステータスと振る舞いのマトリクスが開発者の頭の中にしかなく、コードから読み取れない"

trial_approach: "ステータスをenumで持ち、各メソッドの先頭でswitch文に統一する"
trial_limits:
  - "switch文を使っても、ステータスが増えるたびに全メソッドのswitchを開く必要がある"
  - "ステータスが増えるほどswitch文の分岐が増え、「どのステータスで何ができるか」が追いにくくなる"

advanced_scenario:
  what: "『一時停止』状態を追加したい（システムメンテナンス中は全操作を一時的にロック）"
  extension: |
    Stateパターンでは、一時停止状態を IReservationState を実装した SuspendedState クラスとして追加する。
    既存のステータスクラスに触れずに新しい状態を追加できることが確認できる。
    「既存コードへの影響ゼロ」がStateパターンの真の価値。
  difficulty_type: "パターンA：新しい状態を追加するたびに全振る舞いへの影響が出る"

threshold:
  use_when:
    - "ステータスが4つ以上あり、今後も増える見込みがある"
    - "複数のメソッドが「現在のステータス」によって振る舞いを変えている"
    - "ステータスの追加・変更のたびに複数箇所を修正している"
  skip_when:
    - "2〜3個の固定された状態で振る舞いの変化も単純"
    - "状態が増える見込みがなく、メソッド数も少ない"

next_chapter:
  preview: "次章では「処理の一部のステップだけ」が変わるという別の変化を扱います"
