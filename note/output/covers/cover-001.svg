  <rect width="1280" height="670" fill="#16213e"/>

  <!-- 装飾：左上の大きな円 -->
  <circle cx="80" cy="80" r="220" fill="#e94560" opacity="0.08"/>

  <!-- 装飾：右下の円 -->
  <circle cx="1220" cy="610" r="180" fill="#e94560" opacity="0.10"/>

  <!-- 装飾：中央の細いライン -->
  <line x1="120" y1="335" x2="1160" y2="335" stroke="#e94560" stroke-width="1" opacity="0.20"/>

  <!-- メインタイトル（3行） -->
  <text
    text-anchor="middle"
    font-family="'Hiragino Kaku Gothic ProN','Hiragino Sans','BIZ UDPGothic',sans-serif"
