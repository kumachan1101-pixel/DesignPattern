name: Validate design-pattern book

on:
  push:
    paths:
      - "kindle/design-patterns/**"
      - ".github/workflows/validate-design-pattern-book.yml"
  pull_request:
    paths:
      - "kindle/design-patterns/**"
      - ".github/workflows/validate-design-pattern-book.yml"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate chapter structure and residue
        run: python kindle/design-patterns/script/validate_book.py
      - name: Detect new review risks and compile published C++ examples
        run: python kindle/design-patterns/script/audit_book.py --check-baseline
